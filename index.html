<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD - Yapay Zeka</title>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; }
        .user-message { align-self: flex-end; background-color: #2c2c2c; color: #fff; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background-color: #1a1a2e; color: #d1d1d1; border-bottom-left-radius: 2px; border: 1px solid #30363d; }
        #input-area { background-color: #1a1a1a; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background-color: #252525; border: 1px solid #444; border-radius: 8px; color: white; padding: 12px; outline: none; }
        button { background-color: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .loading { font-style: italic; color: #888; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai-message">Merhaba, ben OZD. Bağlantı testi hazır! Bana bir şey yazabilirsin.</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Bir şeyler yazın..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Gönder</button>
    </div>

    <script>
        // API Parçaları
        const p1 = "AIzaSyAMsfME";
        const p2 = "mXBVbrsPdXh";
        const p3 = "t2G0E0ENZhsp";
        const p4 = "NRpE";
        const FULL_KEY = p1 + p2 + p3 + p4;

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatContainer = document.getElementById('chat-container');
            const messageText = inputField.value.trim();

            if (!messageText) return;

            appendMessage(messageText, 'user-message');
            inputField.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message loading';
            loadingDiv.innerText = 'OZD yanıtlıyor...';
            chatContainer.appendChild(loadingDiv);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FULL_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: messageText }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // API'den gelen spesifik hata mesajını göster
                    throw new Error(data.error ? data.error.message : "API Hatası");
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                chatContainer.removeChild(loadingDiv);
                appendMessage(aiResponse, 'ai-message');

            } catch (error) {
                console.error("Detaylı Hata:", error);
                chatContainer.removeChild(loadingDiv);
                appendMessage("Hata: " + error.message, 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const chatContainer = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
