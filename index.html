<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD | Yapay Zeka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --container-bg: #16161d;
            --accent-color: #8257e5;
            --text-color: #f0f0f0;
            --bot-msg-bg: #21212b;
            --user-msg-bg: #323245;
            --error-color: #ff4757;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 95%;
            max-width: 700px;
            height: 90vh;
            background: var(--container-bg);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .chat-header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(130, 87, 229, 0.4);
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-end; background-color: var(--user-msg-bg); color: #fff; border-bottom-right-radius: 4px; }
        .bot-message { align-self: flex-start; background-color: var(--bot-msg-bg); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        .error-message { background: rgba(255, 71, 87, 0.15); color: var(--error-color); align-self: center; border: 1px solid var(--error-color); font-size: 0.8rem; }

        .input-area { padding: 15px; display: flex; gap: 8px; background: rgba(0,0,0,0.3); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; }

        input { flex: 1; background: #1e1e26; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        input:focus { border-color: var(--accent-color); }

        button { background: var(--accent-color); color: white; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }

        .loading-text { font-style: italic; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header"><h1>OZD</h1></div>
    <div id="chat-window"><div class="message bot-message">Sisteme giriş yapıldı kanka. Ben OZD, seni dinliyorum.</div></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Mesajını yaz..." autocomplete="off">
        <button id="send-btn">Gönder</button>
    </div>
</div>

<script>
    // Parçalanmış API Key (4 parça)
    const k1 = "AIzaSyAM";
    const k2 = "sfMEmXBV";
    const k3 = "brsPdXht";
    const k4 = "2G0E0ENZhspNRpE";
    
    const API_KEY = (k1 + k2 + k3 + k4).trim();

    // v1 endpoint'i daha stabildir
    const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const inputField = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const chatWindow = document.getElementById("chat-window");

    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text) return;

        appendMessage(text, "user-message");
        inputField.value = "";

        const loading = appendMessage("OZD yanıtlıyor...", "bot-message loading-text");
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    // OZD'ye karakterini burada öğretiyoruz kanka
                    systemInstruction: { parts: [{ text: "Senin adın OZD. Sade, akıllı ve yardımsever bir yapay zekasın. Kullanıcıya kanka diye hitap edebilirsin." }] }
                })
            });

            const data = await response.json();
            chatWindow.removeChild(loading);

            if (data.error) {
                // Eğer hala 404 geliyorsa burada kabak gibi göreceğiz
                appendMessage("Hata: " + data.error.message + " (Kod: " + data.error.code + ")", "error-message");
                return;
            }

            if (data.candidates && data.candidates[0].content) {
                const reply = data.candidates[0].content.parts[0].text;
                appendMessage(reply, "bot-message");
            } else {
                appendMessage("Boş cevap geldi kanka, tekrar dener misin?", "error-message");
            }

        } catch (err) {
            chatWindow.removeChild(loading);
            appendMessage("Bağlantı koptu! API keyini veya internetini kontrol et.", "error-message");
            console.error("Detaylı Hata:", err);
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function appendMessage(text, className) {
        const div = document.createElement("div");
        div.className = `message ${className}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }

    sendBtn.addEventListener("click", sendMessage);
    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
