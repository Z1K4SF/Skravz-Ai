<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD | Ölümcül Sözleşme</title>
    <style>
        /* Genel Stil Ayarları */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        /* Video Listesi Konteynırı */
        .container {
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding-bottom: 50px;
        }

        /* Her Bir Video Kartı */
        .video-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-5px);
        }

        .video-info {
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
        }

        .video-info h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-color);
        }

        video {
            width: 100%;
            display: block;
            outline: none;
        }

        /* Alt Bilgi */
        footer {
            padding: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>OZD</h1>
        <p>Video Arşivi</p>
    </header>

    <div class="container" id="video-listesi">
        </div>

    <footer>
        &copy; 2026 OZD - Tüm Hakları Saklıdır.
    </footer>

    <script>
        // 20 videoyu otomatik olarak oluşturma döngüsü
        const liste = document.getElementById('video-listesi');
        const toplamVideo = 40;

        for (let i = 1; i <= toplamVideo; i++) {
            // Kart oluşturma
            const kart = document.createElement('div');
            kart.className = 'video-card';

            // İçerik oluşturma (videoX.mp4 formatında)
            kart.innerHTML = `
                <div class="video-info">
                    <h2>Video ${i}</h2>
                </div>
                <video controls preload="metadata">
                    <source src="video${i}.mp4" type="video/mp4">
                    Tarayıcınız bu videoyu desteklemiyor.
                </video>
            `;

            liste.appendChild(kart);
        }
    </script>

</body>
</html>
