<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD AI | Geleceğin Asistanı</title>
    <style>
        /* Sade, Şık ve Modern Koyu Tema */
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --accent: #00d2ff;
            --text: #ffffff;
            --ai-bubble: #252525;
            --user-bubble: #005a70;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 4px;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background-color: var(--ai-bubble); border-bottom-left-radius: 2px; border: 1px solid #333; }

        .input-area {
            padding: 20px;
            background-color: var(--surface);
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        button {
            background-color: var(--accent);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .loading { color: #888; font-style: italic; font-size: 13px; }
    </style>
</head>
<body>

<header>OZD</header>

<div id="chat-window">
    <div class="msg ai">Merhaba! Ben OZD. API bağlantısını tekrar kuruyorum. Bana bir şey sorabilirsin!</div>
</div>

<div class="input-area">
    <input type="text" id="user-in" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
    <button id="send-btn">GÖNDER</button>
</div>

<script>
    // API Anahtarını 4 Parçaya Bölerek İşliyoruz
    const k1 = "AIzaSyAMsfME";
    const k2 = "mXBVbrsPdXh";
    const k3 = "t2G0E0ENZhsp";
    const k4 = "NRpE";
    const FINAL_KEY = k1 + k2 + k3 + k4;

    // 2026 yılı için en güncel model ismi denemesi
    // Eğer bu da çalışmazsa 'gemini-pro' veya 'gemini-1.5-flash' olarak değiştirilebilir.
    const MODEL_NAME = "gemini-1.5-flash-latest"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${FINAL_KEY}`;

    const chatWin = document.getElementById('chat-window');
    const input = document.getElementById('user-in');
    const btn = document.getElementById('send-btn');

    async function askOZD() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';

        const loadDiv = addMsg("OZD yanıt hazırlıyor...", "ai loading");

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();

            if (!response.ok) {
                // Hata durumunda API'den gelen mesajı göster
                throw new Error(data.error ? data.error.message : "Bağlantı Hatası");
            }

            const aiText = data.candidates[0].content.parts[0].text;
            loadDiv.remove();
            addMsg(aiText, 'ai');

        } catch (err) {
            loadDiv.innerText = "Hata oluştu: " + err.message;
            console.error("Hata Detayı:", err);
        }
    }

    function addMsg(text, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = text;
        chatWin.appendChild(d);
        chatWin.scrollTop = chatWin.scrollHeight;
        return d;
    }

    btn.addEventListener('click', askOZD);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') askOZD(); });
</script>

</body>
</html>
