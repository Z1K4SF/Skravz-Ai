<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZD — Yapay Zeka Asistan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#c8a96e;--accent2:#e8c98e;
  --text:#e8e6e0;--text2:#9b9890;--text3:#5e5c58;
  --red:#f87171;--green:#4ade80;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overflow:hidden}
#app{display:grid;grid-template-columns:260px 1fr;height:100vh}
#sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-header{padding:24px 20px 18px;border-bottom:1px solid var(--border)}
#ai-name-display{font-family:'DM Serif Display',serif;font-size:21px;color:var(--accent2);margin-bottom:4px}
#ai-tagline{font-size:11px;color:var(--text3);letter-spacing:.4px;text-transform:uppercase}
.sdot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:5px;box-shadow:0 0 5px var(--green)}
#sidebar-controls{padding:16px;flex:1;overflow-y:auto}
.clabel{font-size:10px;letter-spacing:.9px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:block}
.cinput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.cinput:focus{border-color:var(--accent)}
textarea.cinput{resize:vertical;min-height:90px;line-height:1.5}
.cgroup{margin-bottom:16px}
.apply-btn{width:100%;padding:9px;background:linear-gradient(135deg,rgba(200,169,110,.15),rgba(200,169,110,.07));border:1px solid rgba(200,169,110,.3);border-radius:8px;color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:2px}
.new-btn{margin:0 16px 14px;padding:9px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;justify-content:center}
#main{display:flex;flex-direction:column;height:100vh;background:var(--bg)}
#chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(13,15,20,.85);backdrop-filter:blur(12px)}
#messages{flex:1;overflow-y:auto;padding:24px;display:none;flex-direction:column;gap:0}
.mwrap{display:flex;gap:13px;padding:15px 0;border-bottom:1px solid var(--border)}
.av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.av.ai{background:linear-gradient(135deg,rgba(200,169,110,.28),rgba(200,169,110,.09));border:1px solid rgba(200,169,110,.38);color:var(--accent2);font-family:'DM Serif Display',serif}
.av.user{background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text2)}
.mcontent{flex:1;min-width:0}
.mname{font-size:11px;font-weight:500;margin-bottom:7px}
.mtext{color:var(--text);line-height:1.78;font-size:15px;white-space:pre-wrap}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:36px}
#welcome h2{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent2)}
#att-bar{padding:10px 24px 0;display:none;gap:8px}
.att-file-prev{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text2);cursor:pointer}
#input-area{padding:12px 24px 20px;background:var(--bg);border-top:1px solid var(--border)}
#input-box{display:flex;gap:10px;align-items:flex-end;background:var(--bg2);border:1px solid var(--border2);border-radius:13px;padding:9px 12px}
#user-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;resize:none;outline:none;max-height:160px;min-height:24px}
#send-btn{width:36px;height:36px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;color:#0d0f14;font-size:18px}
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="ai-name-display">OZD</div>
      <div id="ai-tagline"><span class="sdot"></span>Çevrimiçi · Aktif</div>
    </div>
    <div id="sidebar-controls">
      <div class="cgroup">
        <span class="clabel">Yapay Zekanın Adı</span>
        <input type="text" class="cinput" id="ai-name-input" value="OZD">
      </div>
      <div class="cgroup">
        <span class="clabel">Kişilik / Sistem Promptu</span>
        <textarea class="cinput" id="system-prompt">Sen OZD adlı gelişmiş bir yapay zeka asistanısın. Türkçe konuşan, zeki ve nazik birisin.</textarea>
      </div>
      <button class="apply-btn" onclick="location.reload()">Sıfırla ve Uygula ✓</button>
    </div>
    <button class="new-btn" onclick="location.reload()">Yeni Sohbet</button>
  </div>

  <div id="main">
    <div id="chat-header">
      <div>
        <div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--accent2)" id="header-name">OZD</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">Sistem Versiyonu: 1.0.7 (Failsafe)</div>
      </div>
      <div id="model-badge" style="background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);padding:4px 10px;border-radius:20px;font-size:10px;margin-left:auto">Bağlantı Stabil</div>
    </div>

    <div id="messages"></div>

    <div id="welcome">
      <h2 id="welcome-title">Merhaba, ben OZD</h2>
      <p style="color:var(--text3);font-size:13px;margin-top:8px">Gemini 1.5 Motoru aktif. Hazırım kankam!</p>
    </div>

    <div id="att-bar"></div>

    <div id="input-area">
      <div id="input-box">
        <button style="background:none;border:none;cursor:pointer;font-size:20px" onclick="document.getElementById('file-input').click()">📎</button>
        <textarea id="user-input" rows="1" placeholder="Mesajınızı buraya yazın..."></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <div style="font-size:10px;color:var(--text3);text-align:right;margin-top:6px">Enter → Gönder | Versiyon: 1.0.7</div>
    </div>
  </div>
</div>

<input type="file" id="file-input" multiple style="display:none">

<script>
var messages=[];
var pendingAtts=[];
var isLoading=false;
var aiName='OZD';

var messagesEl=document.getElementById('messages');
var welcomeEl=document.getElementById('welcome');
var inputEl=document.getElementById('user-input');
var sendBtn=document.getElementById('send-btn');
var attBar=document.getElementById('att-bar');

function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

inputEl.onkeydown=function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
};

async function processFile(file){
  return new Promise((res)=>{
    var r=new FileReader();
    r.onload=()=>res({name:file.name,data:r.result.split(',')[1],mediaType:file.type});
    r.readAsDataURL(file);
  });
}

document.getElementById('file-input').onchange=async function(e){
  for(var f of e.target.files){
    var a=await processFile(f);
    pendingAtts.push(a);
  }
  renderBar();
};

function renderBar(){
  attBar.innerHTML='';
  if(!pendingAtts.length){attBar.style.display='none';return;}
  attBar.style.display='flex';
  pendingAtts.forEach((a,i)=>{
    var d=document.createElement('div');d.className='att-file-prev';
    d.innerHTML='📎 '+a.name;
    d.onclick=()=>{pendingAtts.splice(i,1);renderBar()};
    attBar.appendChild(d);
  });
}

function addMsg(role,text){
  welcomeEl.style.display='none';
  messagesEl.style.display='flex';
  var wrap=document.createElement('div');wrap.className='mwrap';
  var isAI=role==='model';
  wrap.innerHTML='<div class="av '+(isAI?'ai':'user')+'">'+(isAI?aiName[0]:'S')+'</div>'
    +'<div class="mcontent">'
    +'<div class="mname '+(isAI?'ai':'user')+'">'+(isAI?aiName:'Sen')+'</div>'
    +'<div class="mtext">'+(text?esc(text):'...')+'</div>'
    +'</div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop=messagesEl.scrollHeight;
  return wrap.querySelector('.mtext');
}

async function sendMessage(){
  var text=inputEl.value.trim();
  if(!text&&!pendingAtts.length)return;
  if(isLoading)return;

  var currentAtts=pendingAtts.slice();
  pendingAtts=[];renderBar();
  inputEl.value='';
  isLoading=true;sendBtn.disabled=true;

  var parts=[];
  // Failsafe: Sistem talimatını ilk mesajın içine gömüyoruz
  if(messages.length === 0){
    parts.push({text: "TALİMAT: " + document.getElementById('system-prompt').value + "\n\nKULLANICI: " + (text || "Dosyayı incele.")});
  } else {
    parts.push({text: text || "Dosyayı incele."});
  }
  
  for(var a of currentAtts){
    parts.push({inlineData:{mimeType:a.mediaType,data:a.data}});
  }

  messages.push({role:'user',parts:parts});
  addMsg('user',text);
  var typingEl=addMsg('model','');

  // ŞİFREYİ 4 PARÇAYA BÖLDÜK (KESİN ÇÖZÜM)
  var a1='AIzaSyAMsf';
  var a2='MEmXBVbrs';
  var a3='PdXht2G0E';
  var a4='0ENZhspNRpE';
  var API_KEY = a1+a2+a3+a4;
  
  // v1 SUNUCUSU VE STABİL MODEL
  var url = 'https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key='+API_KEY;

  try{
    var resp=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ contents: messages })
    });
    var data=await resp.json();
    if(data.error) throw new Error(data.error.message);
    var reply=data.candidates[0].content.parts[0].text;
    typingEl.innerHTML=esc(reply);
    messages.push({role:'model',parts:[{text:reply}]});
  }catch(err){
    typingEl.innerHTML='<span style="color:var(--red)">Hata: '+err.message+'</span>';
  }
  isLoading=false;sendBtn.disabled=false;
}
</script>
</body>
</html>
