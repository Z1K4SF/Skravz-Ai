<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD | Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #111111;
            --accent: #e50914; /* Netflix Kırmızısı tarzı veya #00d2ff yapabilirsin */
            --text: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* Navigasyon */
        nav {
            padding: 20px 5%;
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        nav h1 {
            margin: 0;
            letter-spacing: 4px;
            color: var(--accent);
            font-size: 2rem;
        }

        /* Grid Sistemi */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }

        /* Video Kartı */
        .card {
            background: var(--surface);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
            border: 1px solid #222;
        }

        .card:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background: #222;
        }

        .card-info {
            padding: 12px;
        }

        .card-info h3 {
            margin: 0;
            font-size: 0.9rem;
            color: #ccc;
        }

        /* Video Oynatıcı Alanı */
        video {
            width: 100%;
            display: none; /* Başlangıçta gizli, tıklandığında açılacak */
            aspect-ratio: 16/9;
        }

        .playing video {
            display: block;
        }
        
        .playing img {
            display: none;
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #444;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

    <nav>
        <h1>OZD</h1>
        <div style="font-size: 0.8rem; color: #666;">50 ÖZEL İÇERİK</div>
    </nav>

    <div class="video-grid" id="main-grid">
        </div>

    <footer>
        OZD PREMIUM &copy; 2026
    </footer>

    <script>
        const grid = document.getElementById('main-grid');
        const total = 50;

        for (let i = 1; i <= total; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Hız için: Videoları hemen yüklemek yerine sadece tıklandığında yükleyen yapı
            card.innerHTML = `
                <div class="thumb-container" onclick="playVideo(this, ${i})">
                    <img src="https://via.placeholder.com/400x225/111/fff?text=Bölüm+${i}" alt="Bölüm ${i}">
                    <div id="video-placeholder-${i}"></div>
                </div>
                <div class="card-info">
                    <h3>Bölüm ${i.toString().padStart(2, '0')}</h3>
                </div>
            `;
            grid.appendChild(card);
        }

        function playVideo(container, id) {
            const placeholder = document.getElementById(`video-placeholder-${id}`);
            
            // Eğer video zaten eklenmemişse ekle (Lazy Load)
            if (!placeholder.innerHTML) {
                placeholder.innerHTML = `
                    <video controls autoplay>
                        <source src="video${id}.mp4" type="video/mp4">
                    </video>
                `;
                container.classList.add('playing');
                container.querySelector('img').style.display = 'none';
            }
        }
    </script>

</body>
</html>
