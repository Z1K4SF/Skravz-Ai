<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD | Powered by Gemini 2.5</title>
    <style>
        /* Modern, Ultra-Sade Koyu Tema */
        :root {
            --bg-deep: #050505;
            --card-bg: #111111;
            --accent-blue: #007aff;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent-blue);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
        }

        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            align-self: flex-end;
            background-color: var(--accent-blue);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-bubble {
            align-self: flex-start;
            background-color: var(--card-bg);
            border: 1px solid #222;
            border-bottom-left-radius: 4px;
        }

        .input-wrapper {
            padding: 25px;
            background: var(--bg-deep);
            border-top: 1px solid #222;
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            padding: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .status {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }
    </style>
</head>
<body>

<header>OZD AI</header>

<div id="chat-area">
    <div class="bubble ai-bubble">Gemini 2.5 Flash motoru aktif. OZD yardım etmeye hazır.</div>
</div>

<div class="input-wrapper">
    <input type="text" id="user-input" placeholder="OZD'ye sorun..." autocomplete="off">
    <button id="send-button">GÖNDER</button>
</div>

<script>
    // API Anahtarı Güvenlik Parçaları
    const seg1 = "AIzaSyAMsfME";
    const seg2 = "mXBVbrsPdXh";
    const seg3 = "t2G0E0ENZhsp";
    const seg4 = "NRpE";
    const FULL_KEY = seg1 + seg2 + seg3 + seg4;

    // Gemini 2.5 Flash Model Bağlantısı
    const MODEL = "gemini-2.5-flash"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${FULL_KEY}`;

    const chatArea = document.getElementById('chat-area');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-button');

    async function handleResponse() {
        const query = userInput.value.trim();
        if (!query) return;

        createBubble(query, 'user-bubble');
        userInput.value = '';

        const tempBubble = createBubble("OZD analiz ediyor...", "ai-bubble status");

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: query }] }]
                })
            });

            const data = await response.json();

            if (!response.ok) {
                // Eğer model ismi hala hata verirse burası çalışır
                throw new Error(data.error ? data.error.message : "Bağlantı kesildi.");
            }

            const aiText = data.candidates[0].content.parts[0].text;
            tempBubble.remove();
            createBubble(aiText, 'ai-bubble');

        } catch (err) {
            tempBubble.innerText = "Hata: " + err.message;
            console.error("Hata Detayı:", err);
        }
    }

    function createBubble(text, className) {
        const div = document.createElement('div');
        div.className = `bubble ${className}`;
        div.innerText = text;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    sendBtn.addEventListener('click', handleResponse);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleResponse();
    });
</script>

</body>
</html>
