<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD | Premium Video Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: #121212;
            --accent: #00d2ff; /* Canlı mavi */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Başlık Alanı */
        header {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 5px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        header p {
            color: var(--text-dim);
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Video Izgarası (Grid) */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Video Kartı */
        .video-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-card:hover {
            transform: scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }

        .video-card h2 {
            font-size: 1rem;
            padding: 15px 20px;
            margin: 0;
            font-weight: 500;
            background: #181818;
            color: var(--text-dim);
        }

        .video-card:hover h2 {
            color: var(--accent);
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #333;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

    <header>
        <h1>OZD</h1>
        <p>PREMIUM ARCHIVE</p>
    </header>

    <div class="container" id="gallery">
        </div>

    <footer>
        OZD &copy; 2026 | Digital Content Gallery
    </footer>

    <script>
        const gallery = document.getElementById('gallery');
        const totalVideos = 40; // Sayıyı 40'a çıkardık

        for (let i = 1; i <= totalVideos; i++) {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            card.innerHTML = `
                <h2>Video ${i.toString().padStart(2, '0')}</h2>
                <video controls preload="metadata">
                    <source src="video${i}.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
            
            gallery.appendChild(card);
        }
    </script>

</body>
</html>
