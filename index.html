<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZD GPT — Debug Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    :root {
        --bg: #05070a;
        --accent: #2ea44f;
        --text: #ffffff;
        --user-msg: #161b22;
        --ai-msg: rgba(46, 164, 79, 0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
    #app { width: 100%; max-width: 900px; height: 100vh; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
    #header { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .msg { max-width: 85%; padding: 14px 18px; border-radius: 15px; line-height: 1.6; font-size: 15px; }
    .user { align-self: flex-end; background: var(--user-msg); border: 1px solid #333; }
    .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid rgba(46, 164, 79, 0.2); }
    #input-section { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .input-box { background: #161b22; border-radius: 12px; display: flex; padding: 5px 15px; align-items: center; border: 1px solid #30363d; }
    input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; }
    button { background: var(--accent); border: none; color: #fff; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; }
    .error-log { color: #f87171; font-size: 12px; padding: 5px; background: rgba(248, 113, 113, 0.1); border-radius: 5px; margin-top: 5px; display: none; }
</style>
</head>
<body>

<div id="app">
    <div id="header">
        <div style="color:var(--accent); font-weight:bold;">OZD <span style="font-size:10px; opacity:0.5;">v2.3</span></div>
        <div id="status" style="font-size:12px; color:#4ade80;">GitHub Engine</div>
    </div>

    <div id="chat">
        <div class="msg ai">Selam Eren kankam! Bağlantıyı kontrol ettim, hadi bir şeyler yaz da motoru test edelim.</div>
    </div>

    <div id="input-section">
        <div id="errorBox" class="error-log"></div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mesajını yaz...">
            <button onclick="send()">🚀</button>
        </div>
    </div>
</div>

<script>
const GITHUB_TOKEN = "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";
// GitHub Models için en garanti endpoint
const API_URL = "https://models.inference.ai.azure.com/chat/completions";

var messages = [
    { role: "system", content: "Sen OZD'sin. Eren'in kankası, zeki ve samimi bir asistansın." }
];

async function send() {
    const input = document.getElementById('userInput');
    const errBox = document.getElementById('errorBox');
    const text = input.value.trim();
    if(!text) return;

    errBox.style.display = 'none';
    const chatDiv = document.getElementById('chat');
    chatDiv.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = '';
    
    const aiMsgDiv = document.createElement('div');
    aiMsgDiv.className = 'msg ai';
    aiMsgDiv.innerText = 'Düşünüyorum...';
    chatDiv.appendChild(aiMsgDiv);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    messages.push({ role: "user", content: text });

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${GITHUB_TOKEN}`
            },
            body: JSON.stringify({
                // Bazı PAT'lerde gpt-4o kapalı olabilir, gpt-4o-mini daha garantidir
                model: "gpt-4o-mini", 
                messages: messages,
                temperature: 0.7,
                max_tokens: 1000
            })
        });

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || "Sunucu hatası: " + response.status);
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;
        
        aiMsgDiv.innerHTML = marked.parse(reply);
        messages.push({ role: "assistant", content: reply });

    } catch (err) {
        aiMsgDiv.innerHTML = `<span style="color:#f87171">OZD bir sorunla karşılaştı.</span>`;
        errBox.style.display = 'block';
        errBox.innerText = "Detay: " + err.message;
        console.error("Hata:", err);
    }
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

document.getElementById('userInput').onkeydown = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
