<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZD — Yapay Zeka Asistan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--accent:#c8a96e;--text:#e8e6e0;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column}
#header{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px}
.msg{max-width:80%;padding:12px;border-radius:10px;line-height:1.5}
.user{align-self:flex-end;background:var(--bg2);border:1px solid var(--accent)}
.ai{align-self:flex-start;background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.3)}
#input-area{padding:20px;background:var(--bg2);display:flex;gap:10px}
input{flex:1;background:#1a1e2a;border:1px solid #333;color:#fff;padding:12px;border-radius:8px;outline:none}
button{background:var(--accent);border:none;padding:0 20px;border-radius:8px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<div id="header">
    <div><strong>OZD</strong> <span style="font-size:10px;opacity:0.5">v1.1.0</span></div>
    <div style="font-size:10px">Durum: <span style="color:#4ade80">Süper Stabil</span></div>
</div>

<div id="chat">
    <div class="msg ai">Selam Eren kankam! 1.1.0 motoru ateşlendi. OZD emrine amade!</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Bir şey yaz kankam...">
    <button onclick="send()">GÖNDER</button>
</div>

<script>
var chatHistory = [];
var isLoading = false;

async function send() {
    var input = document.getElementById('userInput');
    var text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    isLoading = true;
    
    var chatDiv = document.getElementById('chat');
    chatDiv.innerHTML += '<div class="msg user">'+text+'</div>';
    
    var aiMsgDiv = document.createElement('div');
    aiMsgDiv.className = 'msg ai';
    aiMsgDiv.innerText = '...';
    chatDiv.appendChild(aiMsgDiv);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    // ŞİFREYİ 5 PARÇAYA BÖLEREK GÜVENLİĞE ALIYORUZ
    var s1 = 'AIzaSyAM';
    var s2 = 'sfMEmX';
    var s3 = 'BVbrsPd';
    var s4 = 'Xht2G0E';
    var s5 = '0ENZhspNRpE';
    var API_KEY = s1 + s2 + s3 + s4 + s5;

    // KİŞİLİK AYARINI GİZLİCE İLK MESAJIN BAŞINA EKLİYORUZ
    var promptPrefix = "";
    if(chatHistory.length === 0) {
        promptPrefix = "SİSTEM TALİMATI: Sen OZD adlı, Eren'in kankası olan, zeki ve Türkçe konuşan bir yapay zekasın. \n\n KULLANICI MESAJI: ";
    }

    chatHistory.push({ role: "user", parts: [{ text: promptPrefix + text }] });

    // EN GARANTİ v1 SUNUCUSU VE EN GÜNCEL 8B MODELİ
    var url = 'https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-8b:generateContent?key=' + API_KEY;

    try {
        var response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: chatHistory })
        });

        var data = await response.json();
        
        if (data.error) {
            aiMsgDiv.innerHTML = '<span style="color:var(--red)">Hata: ' + data.error.message + '</span>';
        } else {
            var reply = data.candidates[0].content.parts[0].text;
            aiMsgDiv.innerText = reply;
            chatHistory.push({ role: "model", parts: [{ text: reply }] });
        }
    } catch (err) {
        aiMsgDiv.innerHTML = '<span style="color:var(--red)">Bağlantı koptu kankam!</span>';
    }

    isLoading = false;
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

// Enter tuşu desteği
document.getElementById('userInput').onkeydown = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
