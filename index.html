<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD | Yapay Zeka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f12;
            --container-bg: #1a1a20;
            --accent-color: #7c4dff;
            --text-color: #e0e0e0;
            --bot-msg-bg: #252530;
            --user-msg-bg: #3d3d5c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--container-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            margin: 20px;
        }

        .chat-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar Styling */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--bot-msg-bg); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
        }

        input {
            flex: 1;
            background: #2a2a35;
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { box-shadow: 0 0 0 2px var(--accent-color); }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: scale(1.05); }

        .loading { font-style: italic; opacity: 0.6; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>OZD</h1>
    </div>
    <div id="chat-window">
        <div class="message bot-message">Merhaba kanka, ben OZD. Nasıl yardımcı olabilirim?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Bir şeyler yaz..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Gönder</button>
    </div>
</div>

<script>
    // API Key parçaları (İstediğin gibi böldüm kanka)
    const _0x1 = "AIzaSyAM";
    const _0x2 = "sfMEmXBV";
    const _0x3 = "brsPdXht";
    const _0x4 = "2G0E0ENZhspNRpE";
    
    const API_KEY = _0x1 + _0x2 + _0x3 + _0x4;

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatWindow = document.getElementById("chat-window");
        const message = inputField.value.trim();

        if (!message) return;

        // Kullanıcı mesajını ekrana bas
        appendMessage(message, "user-message");
        inputField.value = "";

        // Yükleniyor ibaresi
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message bot-message loading";
        loadingDiv.innerText = "OZD düşünüyor...";
        chatWindow.appendChild(loadingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: message }] }]
                })
            });

            const data = await response.json();
            chatWindow.removeChild(loadingDiv);

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const botResponse = data.candidates[0].content.parts[0].text;
                appendMessage(botResponse, "bot-message");
            } else {
                appendMessage("Bir sorun oluştu kanka, tekrar dener misin?", "bot-message");
            }
        } catch (error) {
            chatWindow.removeChild(loadingDiv);
            appendMessage("Bağlantı hatası! API anahtarını veya internetini kontrol et.", "bot-message");
            console.error(error);
        }
    }

    function appendMessage(text, className) {
        const chatWindow = document.getElementById("chat-window");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
