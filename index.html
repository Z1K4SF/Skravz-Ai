<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZD | Yapay Zeka</title>
    <style>
        /* Modern Koyu Tema Ayarları */
        :root {
            --bg-color: #0d1117;
            --chat-bg: #161b22;
            --user-msg: #21262d;
            --ai-msg: #238636; /* Şık bir yeşil tonu OZD için */
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Başlık Alanı */
        header {
            padding: 15px;
            text-align: center;
            background-color: var(--chat-bg);
            border-bottom: 1px solid #30363d;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        /* Sohbet Alanı */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-bubble {
            align-self: flex-start;
            background-color: var(--chat-bg);
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }

        /* Giriş Alanı */
        .input-container {
            background-color: var(--chat-bg);
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #30363d;
        }

        input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid #30363d;
            border-radius: 10px;
            color: white;
            padding: 12px 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Yükleme Göstergesi */
        .dots {
            font-style: italic;
            color: #8b949e;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>OZD AI</header>

    <div id="chat-window">
        <div class="bubble ai-bubble">Merhaba! Ben OZD. Size bugün nasıl yardımcı olabilirim?</div>
    </div>

    <div class="input-container">
        <input type="text" id="user-input" placeholder="OZD'ye bir şeyler sorun..." autocomplete="off">
        <button id="send-btn">Gönder</button>
    </div>

    <script>
        // API Anahtarını Parçalara Bölerek Saklama (Güvenlik Önlemi)
        const part1 = "AIzaSyAMsfME";
        const part2 = "mXBVbrsPdXh";
        const part3 = "t2G0E0ENZhsp";
        const part4 = "NRpE";
        
        const KEY = part1 + part2 + part3 + part4;
        // v1beta hatasından kaçınmak için stabil 'v1' endpointi kullanılıyor
        const ENDPOINT = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            // Kullanıcı mesajını ekle
            addBubble(text, 'user-bubble');
            userInput.value = '';

            // Yükleme durumu
            const loadingBubble = addBubble("OZD yazıyor...", "ai-bubble dots");

            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : "Sunucu hatası.");
                }

                const aiText = data.candidates[0].content.parts[0].text;
                
                // Yükleme mesajını kaldır ve gerçek yanıtı ekle
                loadingBubble.remove();
                addBubble(aiText, 'ai-bubble');

            } catch (err) {
                loadingBubble.innerText = "Hata: " + err.message;
                console.error("Detaylı Hata:", err);
            }
        }

        function addBubble(text, className) {
            const div = document.createElement('div');
            div.className = `bubble ${className}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleChat();
        });
    </script>
</body>
</html>
