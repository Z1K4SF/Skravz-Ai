<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZD — Yapay Zeka Asistan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--accent:#c8a96e;--text:#e8e6e0;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column}
#header{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px}
.msg{max-width:85%;padding:12px;border-radius:10px;line-height:1.5;word-break:break-word}
.user{align-self:flex-end;background:var(--bg2);border:1px solid var(--accent)}
.ai{align-self:flex-start;background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.3)}
#input-area{padding:20px;background:var(--bg2);display:flex;flex-direction:column;gap:10px;border-top:1px solid rgba(255,255,255,0.05)}
.controls{display:flex;gap:10px;align-items:center}
input[type="text"]{flex:1;background:#1a1e2a;border:1px solid #333;color:#fff;padding:12px;border-radius:8px;outline:none}
#fileInput{display:none}
.file-label{background:#1a1e2a;border:1px solid #333;padding:10px;border-radius:8px;cursor:pointer;color:var(--accent);font-size:20px}
button{background:var(--accent);border:none;padding:0 20px;height:45px;border-radius:8px;cursor:pointer;font-weight:bold;color:#000}
button:disabled{opacity:0.3}
#preview{font-size:12px;color:var(--accent);display:none}
</style>
</head>
<body>

<div id="header">
    <div><strong style="color:var(--accent)">OZD</strong> <span style="font-size:10px;opacity:0.5">Versiyon: 1.5.0 (Flash 2.5)</span></div>
    <div style="font-size:10px">Sunucu: <span id="srv" style="color:#4ade80">Bağlanıyor...</span></div>
</div>

<div id="chat">
    <div class="msg ai">Selam Eren kankam! OZD v2.5-Flash motoruyla hazır. Ne yapıyoruz bugün?</div>
</div>

<div id="input-area">
    <div id="preview">Seçilen dosya hazır!</div>
    <div class="controls">
        <label for="fileInput" class="file-label">📎</label>
        <input type="file" id="fileInput" accept="image/*,application/pdf,video/*">
        <input type="text" id="userInput" placeholder="Bir şeyler yaz kankam...">
        <button id="sendBtn" onclick="send()">GÖNDER</button>
    </div>
</div>

<script>
var chatHistory = [];
var isLoading = false;
var selectedFileData = null;

// Durum bilgisini güncelliyoruz
document.getElementById('srv').innerText = "Stabil v1beta (Flash 2.5)";

// Dosya seçme işlemi
document.getElementById('fileInput').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const base64Data = event.target.result.split(',')[1];
        selectedFileData = {
            mimeType: file.type,
            data: base64Data
        };
        document.getElementById('preview').style.display = 'block';
        document.getElementById('preview').innerText = "Dosya eklendi: " + file.name;
    };
    reader.readAsDataURL(file);
};

async function send() {
    var input = document.getElementById('userInput');
    var btn = document.getElementById('sendBtn');
    var text = input.value.trim();
    
    if ((!text && !selectedFileData) || isLoading) return;

    input.value = '';
    isLoading = true;
    btn.disabled = true;
    
    var chatDiv = document.getElementById('chat');
    chatDiv.innerHTML += '<div class="msg user">' + (text ? text : "Dosya gönderildi") + '</div>';
    
    var aiMsgDiv = document.createElement('div');
    aiMsgDiv.className = 'msg ai';
    aiMsgDiv.innerText = 'OZD (2.5-Flash) yazıyor...';
    chatDiv.appendChild(aiMsgDiv);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    // API ANAHTARI PARÇALARI
    var a = 'AIzaSyAM';
    var b = 'sfMEmXBVbr';
    var c = 'sPdXht2G0';
    var d = 'E0ENZhspNRpE';
    var KEY = a + b + c + d;

    let messageParts = [];
    
    // Kişilik Ayarı ve İlk Mesaj Kontrolü
    let promptText = text;
    if(chatHistory.length === 0) {
        promptText = "TALİMAT: Sen OZD adlı, Eren'in kankası olan zeki bir asistansın. Türkçe cevap ver. \n\n MESAJ: " + (text || "Dosyayı analiz et kankam.");
    }
    
    if(promptText) messageParts.push({ text: promptText });
    if(selectedFileData) messageParts.push({ inlineData: selectedFileData });

    chatHistory.push({ role: "user", parts: messageParts });

    // MODEL ADI: gemini-2.5-flash OLARAK AYARLANDI
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + KEY;

    try {
        var response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: chatHistory })
        });

        var data = await response.json();
        
        if (data.error) {
            aiMsgDiv.innerHTML = '<span style="color:var(--red)">Hata: ' + data.error.message + '</span>';
        } else if (data.candidates && data.candidates[0].content) {
            var reply = data.candidates[0].content.parts[0].text;
            aiMsgDiv.innerText = reply;
            chatHistory.push({ role: "model", parts: [{ text: reply }] });
        }
    } catch (err) {
        aiMsgDiv.innerHTML = '<span style="color:var(--red)">Bağlantı koptu!</span>';
    }

    // Sıfırlama işlemleri
    selectedFileData = null;
    document.getElementById('preview').style.display = 'none';
    document.getElementById('fileInput').value = '';
    isLoading = false;
    btn.disabled = false;
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

document.getElementById('userInput').onkeydown = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
