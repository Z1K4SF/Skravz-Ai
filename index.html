<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZD Ultra — Next Gen AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg: #05070a;
    --card: #0d1117;
    --accent: #d4af37; /* Saf altın rengi */
    --accent-glow: rgba(212, 175, 55, 0.2);
    --text: #ffffff;
    --text-dim: #9ca3af;
    --user-msg: #161b22;
    --ai-msg: rgba(212, 175, 55, 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    overflow: hidden;
}

#app {
    width: 100%;
    max-width: 1000px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    border-left: 1px solid rgba(255,255,255,0.05);
    border-right: 1px solid rgba(255,255,255,0.05);
    background: linear-gradient(180deg, rgba(13,17,23,0) 0%, rgba(13,17,23,1) 100%);
}

#header {
    padding: 20px 30px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
}

.brand { font-size: 24px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; }
.brand span { font-size: 10px; color: var(--text-dim); border: 1px solid var(--text-dim); padding: 2px 6px; border-radius: 4px; }

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.msg {
    max-width: 85%;
    padding: 16px 20px;
    border-radius: 20px;
    line-height: 1.7;
    font-size: 15px;
    transition: all 0.3s ease;
}

.user { align-self: flex-end; background: var(--user-msg); border: 1px solid rgba(255,255,255,0.1); }
.ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid var(--accent-glow); color: #e5e7eb; }

/* Markdown Styling */
.ai pre { background: #000; padding: 15px; border-radius: 10px; overflow-x: auto; margin: 10px 0; border: 1px solid #333; }
.ai code { color: var(--accent); font-family: monospace; }
.ai ul, .ai ol { margin-left: 20px; }

#input-section {
    padding: 30px;
    background: rgba(13, 17, 23, 0.8);
    border-top: 1px solid rgba(255,255,255,0.05);
}

.input-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    display: flex;
    align-items: center;
    padding: 5px 15px;
    transition: 0.3s;
}

.input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    color: #fff;
    padding: 15px;
    outline: none;
    font-size: 16px;
}

.btn-icon {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 10px;
    transition: 0.2s;
}

.btn-icon:hover { color: var(--accent); }

#sendBtn {
    background: var(--accent);
    color: #000;
    width: 45px;
    height: 45px;
    border-radius: 12px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

#file-preview {
    display: none;
    margin-bottom: 10px;
    padding: 10px;
    background: rgba(212, 175, 55, 0.1);
    border-radius: 10px;
    font-size: 12px;
    color: var(--accent);
}
</style>
</head>
<body>

<div id="app">
    <div id="header">
        <div class="brand">OZD <span>ULTRA 2.5</span></div>
        <div style="font-size: 12px; color: #4ade80;">● Sistem Aktif</div>
    </div>

    <div id="chat">
        <div class="msg ai">Selam ! Eğer bu mesajı okuyorsan çok değerli birisi olduğunu bilmen gerekiyor.Çünkü bu proje şuanda deneme sürümünde ve yalnızca çok değerli kişiler test edebilir.Keyfine çıkart ve gördüğün hataları,eklenmesini istediğin şeyleri bana ilet.</div>
    </div>

    <div id="input-section">
        <div id="file-preview"></div>
        <div class="input-box">
            <label for="fileInput" class="btn-icon">📎</label>
            <input type="file" id="fileInput" hidden accept="image/*,application/pdf,video/*">
            <input type="text" id="userInput" placeholder="OZD'ye bir şeyler sor...">
            <button id="sendBtn" class="btn-icon" onclick="send()">🚀</button>
        </div>
    </div>
</div>

<script>
var chatHistory = [];
var selectedFile = null;

// Dosya Yakalama
document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        selectedFile = { mimeType: file.type, data: ev.target.result.split(',')[1] };
        document.getElementById('file-preview').style.display = 'block';
        document.getElementById('file-preview').innerText = "Seçili: " + file.name;
    };
    reader.readAsDataURL(file);
};

async function send() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if((!text && !selectedFile)) return;

    // Arayüzü Hazırla
    const chatDiv = document.getElementById('chat');
    if(text) chatDiv.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = '';
    
    const aiMsgDiv = document.createElement('div');
    aiMsgDiv.className = 'msg ai';
    aiMsgDiv.innerHTML = '...';
    chatDiv.appendChild(aiMsgDiv);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    // API Yapılandırması
    const KEY = 'AIzaSyAM' + 'sfMEmXBVbr' + 'sPdXht2G0' + 'E0ENZhspNRpE';
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?alt=sse&key=${KEY}`;

    let parts = [];
    if(chatHistory.length === 0) parts.push({ text: "Sen OZD'sin. Eren'in kankası, çok akıllı ve hızlı bir asistansın. Her zaman Türkçe ve samimi cevap ver." });
    if(text) parts.push({ text: text });
    if(selectedFile) parts.push({ inlineData: selectedFile });

    chatHistory.push({ role: "user", parts: parts });

    try {
        const response = await fetch(url, {
            method: 'POST',
            body: JSON.stringify({ contents: chatHistory })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullReply = "";
        aiMsgDiv.innerHTML = ""; // Yükleniyor yazısını sil

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");
            
            for (const line of lines) {
                if (line.startsWith("data: ")) {
                    try {
                        const data = JSON.parse(line.substring(6));
                        if (data.candidates && data.candidates[0].content) {
                            const newText = data.candidates[0].content.parts[0].text;
                            fullReply += newText;
                            // Markdown olarak render et
                            aiMsgDiv.innerHTML = marked.parse(fullReply);
                            chatDiv.scrollTop = chatDiv.scrollHeight;
                        }
                    } catch (e) {}
                }
            }
        }
        chatHistory.push({ role: "model", parts: [{ text: fullReply }] });
    } catch (err) {
        aiMsgDiv.innerText = "Bağlantı hatası!";
    }

    // Sıfırla
    selectedFile = null;
    document.getElementById('file-preview').style.display = 'none';
}

document.getElementById('userInput').onkeydown = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
